name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body || github.event.review.body || '', ' /oc') ||
      startsWith(github.event.comment.body || github.event.review.body || '', '/oc') ||
      contains(github.event.comment.body || github.event.review.body || '', ' /opencode') ||
      startsWith(github.event.comment.body || github.event.review.body || '', '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        with:
          model: opencode/minimax-m2.5-free
